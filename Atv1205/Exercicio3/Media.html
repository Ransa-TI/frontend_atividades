<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Média Escolar</title>
    <link rel="stylesheet" href="./Media.css">
</head>
<body>

    <div class="container">
        <h1>Média Escolar</h1>

        <form id="formMedia">
            <input type="text" id="nome" placeholder="Nome do aluno">

            <input type="number" id="n1" placeholder="Nota 1" step="0.1">
            <input type="number" id="n2" placeholder="Nota 2" step="0.1">
            <input type="number" id="n3" placeholder="Nota 3" step="0.1">

            <button id="calcular" type="button">Calcular Média</button>
            <button type="button" id="limpar">Nova Consulta</button>
        </form>

        <div class="resultado" id="resultado"></div>
    </div>

    <script src="./Media.js"></script>
</body>
</html>
