<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Temperatura</title>
    <link rel="stylesheet" href="./Conversor.css">
</head>
<body>

    <div class="container">
        <h1>Conversor</h1>

        <div class="campo">
            <label>Celsius (°C)</label>
            <input type="number" id="celsius" step="0.1">
        </div>

        <div class="campo">
            <label>Fahrenheit (°F)</label>
            <input type="number" id="fahrenheit" step="0.1">
        </div>
    </div>

    <script src="./Conversor.js"></script>
</body>
</html>
